services:
  stats-server:
    build: ./stats-service/stats-server
    ports:
      - "9090:9090"
    depends_on:
      stats-db:
        condition: service_healthy
    environment:
      - SERVER_PORT=9090
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stats
      - SPRING_DATASOURCE_USERNAME=dbuser
      - SPRING_DATASOURCE_PASSWORD=12345


  stats-db:
    image: postgres:16.1
    ports:
      - "5433:5432"
    environment:
        - POSTGRES_DB=stats
        - POSTGRES_USER=dbuser
        - POSTGRES_PASSWORD=12345
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dbuser -d stats" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ewm-service:
    build: ./ewm-main-service
    ports:
      - "8080:8080"
    depends_on:
      ewm-db:
        condition: service_healthy
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db:5432/mainserv
      - SPRING_DATASOURCE_USERNAME=dbuser
      - SPRING_DATASOURCE_PASSWORD=12345
      - STATS_SERVER_URL=http://stats-server:9090

  ewm-db:
    image: postgres:16.1
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=mainserv
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=12345
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dbuser -d mainserv" ]
      interval: 5s
      timeout: 5s
      retries: 10
